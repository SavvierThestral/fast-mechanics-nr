    <!-- Head of wrench (circle opening) -->
    <path
      fill="#1A5FFF"
      d="M18.5 1.5
         a6.5 6.5 0 0 0-5.78 9.47
         L3.6 20.1
         a2.6 2.6 0 0 0 3.67 3.67
         l9.14-9.12
         A6.5 6.5 0 0 0 25.5 8
         a6.4 6.4 0 0 0-.48-2.44
         l-3.6 3.6
         a2.17 2.17 0 0 1-3.06-3.07
         l3.6-3.6
         A6.4 6.4 0 0 0 18.5 1.5z"
    />
    <!-- Highlight dot on wrench head -->
